<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量导入项目调价工具</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>批量导入项目调价工具</h1>
      <div class="header-actions">
        <button id="open-settings-btn" class="header-btn">系统设置</button>
        <button id="open-config-btn" class="header-btn">数据库配置</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="batch">批次管理</button>
      <button class="tab-btn" data-tab="stop">停用项目</button>
      <button class="tab-btn" data-tab="add">新增项目</button>
      <button class="tab-btn" data-tab="record">记录查询</button>
    </nav>

    <main class="content">
      <section id="batch-section" class="tab-content active">
        <div class="toolbar">
          <button id="batch-new" class="btn btn-primary">新建</button>
          <button id="batch-edit" class="btn">编辑</button>
          <button id="batch-delete" class="btn btn-danger">删除</button>
          <button id="batch-refresh" class="btn">刷新</button>
        </div>
        <table id="batch-table" class="data-table">
          <thead>
            <tr>
              <th>批次ID</th>
              <th>批次名称</th>
              <th>描述</th>
              <th>状态</th>
              <th>创建人</th>
              <th>创建时间</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section id="stop-section" class="tab-content">
        <div class="toolbar">
          <label>选择批次：</label>
          <select id="stop-batch-select" class="select"></select>
          <button id="stop-import" class="btn btn-primary">导入Excel</button>
          <button id="stop-template" class="btn">下载模板</button>
          <button id="stop-save" class="btn">保存</button>
          <button id="stop-execute" class="btn btn-danger">执行停用</button>
        </div>
        <table id="stop-table" class="data-table">
          <thead>
            <tr>
              <th>项目编码</th>
              <th>项目名称</th>
              <th>停用原因</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <input type="file" id="stop-file-input" accept=".xlsx,.xls" style="display:none">
      </section>

      <section id="add-section" class="tab-content">
        <div class="toolbar">
          <label>选择批次：</label>
          <select id="add-batch-select" class="select"></select>
          <button id="add-import" class="btn btn-primary">导入Excel</button>
          <button id="add-template" class="btn">下载模板</button>
          <button id="add-save" class="btn">保存</button>
          <button id="add-execute" class="btn btn-danger">执行新增</button>
        </div>
        <table id="add-table" class="data-table">
          <thead>
            <tr>
              <th class="col-wide">项目编码</th>
              <th class="col-wide">项目名称</th>
              <th>执行科室</th>
              <th class="col-wide">门诊归属</th>
              <th class="col-wide">住院归属</th>
              <th>病案费用大类</th>
              <th>病案费用小类</th>
              <th class="col-price">省单价</th>
              <th class="col-price">市单价</th>
              <th class="col-price">县单价</th>
              <th class="col-price">单价</th>
              <th>计价单位</th>
              <th>规格</th>
              <th>型号</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <input type="file" id="add-file-input" accept=".xlsx,.xls" style="display:none">
      </section>

      <section id="record-section" class="tab-content">
        <div class="toolbar">
          <label>批次：</label>
          <select id="record-batch-select" class="select">
            <option value="">全部</option>
          </select>
          <label>类型：</label>
          <select id="record-type-select" class="select">
            <option value="">全部</option>
            <option value="Stop">停用</option>
            <option value="Add">新增</option>
          </select>
          <button id="record-search" class="btn btn-primary">查询</button>
        </div>
        <table id="record-table" class="data-table">
          <thead>
            <tr>
              <th>日志ID</th>
              <th>批次ID</th>
              <th>执行类型</th>
              <th>执行时间</th>
              <th>状态</th>
              <th>消息</th>
              <th>成功数</th>
              <th>失败数</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <footer class="status-bar">
      <span id="status-text">就绪</span>
      <span id="time-display"></span>
    </footer>
  </div>

  <!-- 批次编辑弹窗 -->
  <div id="batch-dialog" class="modal">
    <div class="modal-content">
      <h3 id="batch-dialog-title">新建批次</h3>
      <div class="form-group">
        <label>批次名称：</label>
        <input type="text" id="batch-name-input">
      </div>
      <div class="form-group">
        <label>描述：</label>
        <textarea id="batch-desc-input"></textarea>
      </div>
      <div class="form-actions">
        <button id="batch-dialog-ok" class="btn btn-primary">确定</button>
        <button id="batch-dialog-cancel" class="btn">取消</button>
      </div>
    </div>
  </div>

  <!-- 数据库配置弹窗 -->
  <div id="config-dialog" class="modal">
    <div class="modal-content modal-lg">
      <h3>数据库配置</h3>
      <div class="config-form">
        <div class="form-row">
          <div class="form-group">
            <label>服务器：</label>
            <input type="text" id="config-server" placeholder="localhost">
          </div>
          <div class="form-group">
            <label>端口：</label>
            <input type="text" id="config-port" value="1433">
          </div>
        </div>
        <div class="form-group">
          <label>数据库：</label>
          <input type="text" id="config-database" placeholder="BulkPricingDB">
        </div>
        <div class="form-group">
          <label>用户名：</label>
          <input type="text" id="config-user" placeholder="sa">
        </div>
        <div class="form-group">
          <label>密码：</label>
          <input type="password" id="config-password">
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="config-trust">
            信任服务器证书
          </label>
        </div>
      </div>
      <div class="form-actions">
        <button id="config-test" class="btn">测试连接</button>
        <button id="config-save" class="btn btn-primary">保存</button>
        <button id="config-cancel" class="btn">取消</button>
      </div>
      <div id="config-message" class="config-message"></div>
    </div>
  </div>

  <!-- 系统设置弹窗 -->
  <div id="settings-dialog" class="modal">
    <div class="modal-content modal-lg">
      <h3>系统设置</h3>
      <div class="settings-section">
        <h4>新增项目 - 必填字段设置</h4>
        <p class="settings-hint">勾选的字段在保存时不能为空</p>
        <div id="required-fields-checkboxes" class="checkbox-grid"></div>
      </div>
      <div class="form-actions">
        <button id="settings-save" class="btn btn-primary">保存</button>
        <button id="settings-cancel" class="btn">取消</button>
      </div>
      <div id="settings-message" class="config-message"></div>
    </div>
  </div>

  <script src="js/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/config.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/excel.js"></script>
  <script src="js/batch.js"></script>
  <script src="js/stop.js"></script>
  <script src="js/add.js"></script>
  <script src="js/record.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
